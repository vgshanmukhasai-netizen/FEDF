```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library Management System SPA</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
color:#333;
transition:0.3s;
}

.dark{
background:linear-gradient(135deg,#1e1e1e,#121212);
color:white;
}

nav{
display:flex;
justify-content:center;
gap:15px;
padding:20px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
}

nav button{
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.container{
width:90%;
max-width:1200px;
margin:auto;
padding:20px;
}

.page{
display:none;
}

.active{
display:block;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
margin-bottom:20px;
}

.dark .card{
background:#2c2c2c;
color:white;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:20px;
}

.stat-box{
background:white;
padding:20px;
border-radius:15px;
text-align:center;
font-size:20px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.dark .stat-box{
background:#2c2c2c;
color:white;
}

input{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
}

button.action{
background:#667eea;
color:white;
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:white;
}

.dark table{
background:#2c2c2c;
color:white;
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:center;
}

.success{
color:green;
font-weight:bold;
margin-top:10px;
}

h1,h2{
margin-bottom:15px;
}
</style>
</head>

<body>

<nav>
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('add')">Add Book</button>
<button onclick="showPage('books')">View Books</button>
<button onclick="toggleTheme()">🌙 Theme</button>
</nav>

<div class="container">

<div id="home" class="page active">

<div class="card">
<h1>📚 Library Management System</h1>
<p>Welcome to the Library Portal SPA</p>
</div>

<div class="stats">
<div class="stat-box">
<div id="totalBooks">0</div>
Total Books
</div>

<div class="stat-box">
<div id="availableBooks">0</div>
Available
</div>

<div class="stat-box">
<div id="issuedBooks">0</div>
Issued
</div>
</div>

</div>

<div id="add" class="page">

<div class="card">
<h2>Add New Book</h2>

<form id="bookForm">

<input
type="text"
id="title"
placeholder="Book Title"
required>

<input
type="text"
id="author"
placeholder="Author Name"
required>

<input
type="text"
id="isbn"
placeholder="ISBN"
required>

<button class="action" type="submit">
Add Book
</button>

</form>

<div id="message" class="success"></div>

</div>

</div>

<div id="books" class="page">

<div class="card">

<h2>Book Records</h2>

<input
type="text"
id="search"
placeholder="Search Books..."
onkeyup="searchBooks()">

<table>

<thead>
<tr>
<th>Title</th>
<th>Author</th>
<th>ISBN</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="bookBody">
</tbody>

</table>

</div>

</div>

</div>

<script>

let books=
JSON.parse(localStorage.getItem("books"))||[];

function showPage(id){

document
.querySelectorAll(".page")
.forEach(p=>p.classList.remove("active"));

document
.getElementById(id)
.classList.add("active");
}

function saveBooks(){
localStorage.setItem(
"books",
JSON.stringify(books)
);

renderBooks();
updateStats();
}

document
.getElementById("bookForm")
.addEventListener("submit",function(e){

e.preventDefault();

let title=
document.getElementById("title").value;

let author=
document.getElementById("author").value;

let isbn=
document.getElementById("isbn").value;

books.push({
title,
author,
isbn,
status:"Available"
});

saveBooks();

document.getElementById("message")
.innerHTML="✅ Book Added Successfully";

this.reset();

});

function renderBooks(){

let body=
document.getElementById("bookBody");

body.innerHTML="";

books.forEach((book,index)=>{

body.innerHTML+=`
<tr>
<td>${book.title}</td>
<td>${book.author}</td>
<td>${book.isbn}</td>
<td>${book.status}</td>

<td>

<button
class="action"
onclick="toggleIssue(${index})">
${book.status==="Available"
?"Issue"
:"Return"}
</button>

<button
class="action"
onclick="deleteBook(${index})">
Delete
</button>

</td>
</tr>
`;

});

}

function deleteBook(index){

books.splice(index,1);

saveBooks();
}

function toggleIssue(index){

books[index].status=
books[index].status==="Available"
?"Issued"
:"Available";

saveBooks();
}

function updateStats(){

document.getElementById("totalBooks")
.innerHTML=books.length;

document.getElementById("availableBooks")
.innerHTML=
books.filter(
b=>b.status==="Available"
).length;

document.getElementById("issuedBooks")
.innerHTML=
books.filter(
b=>b.status==="Issued"
).length;
}

function searchBooks(){

let value=
document
.getElementById("search")
.value
.toLowerCase();

let rows=
document.querySelectorAll("#bookBody tr");

rows.forEach(row=>{

let text=
row.innerText.toLowerCase();

row.style.display=
text.includes(value)
?""
:"none";

});

}

function toggleTheme(){
document.body.classList.toggle("dark");
}

renderBooks();
updateStats();

</script>

</body>
</html>
```
