<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>Student Management System</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
            background:linear-gradient(135deg,#6a11cb,#2575fc);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .card{
            width:450px;
            background:rgba(255,255,255,0.15);
            backdrop-filter:blur(15px);
            padding:30px;
            border-radius:20px;
            box-shadow:0 8px 25px rgba(0,0,0,0.3);
            color:white;
        }

        .main-title{
            text-align:center;
            margin-bottom:30px;
            font-size:32px;
        }

        .section-title{
            margin-bottom:15px;
            font-size:22px;
            color:#ffeaa7;
        }

        .input-group{
            display:flex;
            gap:10px;
            margin-bottom:30px;
        }

        .student-input{
            flex:1;
            padding:12px;
            border:none;
            outline:none;
            border-radius:10px;
            font-size:16px;
        }

        .student-input:focus{
            box-shadow:0 0 10px #00f7ff;
        }

        .add-btn{
            padding:12px 20px;
            border:none;
            border-radius:10px;
            background:linear-gradient(45deg,#ff512f,#dd2476);
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        .add-btn:hover{
            transform:scale(1.05);
            box-shadow:0 0 15px rgba(255,255,255,0.6);
        }

        .student-list{
            list-style:none;
        }

        .student-item{
            background:rgba(255,255,255,0.2);
            margin-bottom:12px;
            padding:14px;
            border-radius:12px;
            font-size:18px;
            transition:0.3s;
        }

        .student-item:hover{
            transform:translateX(8px);
            background:rgba(255,255,255,0.35);
        }

    </style>
</head>

<body>

    <div class="card">

        <h1 class="main-title">
            🎓 Student Management System
        </h1>

        <h3 class="section-title">
            ➕ Add Student
        </h3>

        <div class="input-group">

            <input
                type="text"
                id="studentName"
                class="student-input"
                placeholder="Enter Student Name"
            />

            <button class="add-btn" onclick="addStudent()">
                Add
            </button>

        </div>

        <h3 class="section-title">
            📚 Student List
        </h3>

        <ul id="studentList" class="student-list"></ul>

    </div>

    <script>

        function addStudent(){

            let input = document.getElementById("studentName");

            let name = input.value.trim();

            if(name === ""){
                return;
            }

            let li = document.createElement("li");

            li.className = "student-item";

            li.innerHTML = "🌟 " + name;

            document.getElementById("studentList").appendChild(li);

            input.value = "";
        }

    </script>

</body>
</html>
