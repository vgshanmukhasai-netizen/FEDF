<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Employee Performance Dashboard</h1>

<div class="buttons">
    <button onclick="addEmployee()">Add Employee</button>
</div>

<input type="text" id="search" placeholder="Search Employee..." class="search" onkeyup="searchEmployee()">

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Score</th>
            <th>Attendance</th>
            <th>Actions</th>
        </tr>
    </thead>

    <tbody id="employeeTable">
        <!-- Dynamic rows will come here -->
    </tbody>
</table>

<script src="script.js"></script>

</body>
</html>
